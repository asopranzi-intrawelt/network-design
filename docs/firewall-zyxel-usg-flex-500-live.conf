! ============================================================
! Changelog live del firewall Zyxel USG FLEX 500 - Intrawelt
! Mirror incrementale delle modifiche applicate via GUI, in ordine
! cronologico, con riferimento screenshot e stato di conferma.
!
! Non e' un dump completo di startup-config.conf: il file completo
! (2215 righe) non e' versionato in questo repository. Questo file
! traccia SOLO le righe toccate da un intervento, prima e dopo,
! cosi' che la storia git segua il dispositivo reale invece del
! piano target del 05/06/2026 (mai applicato in blocco, vedi
! docs/firewall-zyxel-usg-flex-500.md).
!
! Convenzione di stato per ogni voce:
!   PENDING            - modifica impostata in un dialogo GUI (OK
!                         cliccato) ma non ancora confermata come
!                         scritta sul dispositivo
!   APPLICATA          - confermata da uno screenshot successivo
!                         che mostra il nuovo stato nella lista
!   VERIFICATA IN LOG  - confermata anche dall'osservazione del log
!                         (Fase 0 del piano, "osservare il log per
!                         qualche minuto")
