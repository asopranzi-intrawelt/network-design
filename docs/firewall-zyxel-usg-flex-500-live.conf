! Fonte: sessione guidata GUI, screenshot_01.png - screenshot_09.png
! ------------------------------------------------------------

! Stato rilevato prima dell'intervento (screenshot_01.png, screenshot_05.png):
! secure-policy 1
!  name Blocco_Gruppo_IP_Phishing_Elisa
!  from WAN
!  to any (Excluding ZyWALL)
!  sourceip Bad_IP_Phishing_Elisa_2026
!  action allow
!  log no
!
! address-group Bad_IP_Phishing_Elisa_2026 comprende (screenshot_09.png):
!   IP_01_phishing_2026_Elisa .. IP_09_phishing_2026_Elisa (visibili, lista
!   scorrevole, totale atteso 11 secondo l'analisi del 29/05/2026)
!   IP_09_phishing_2026_Elisa = 203.0.113.5 (IP pubblico del firewall
!   stesso), confermato dal diff tra i backup 19/05 e 05/06/2026 letto
!   durante l'ingestione della cartella [TBC] (01/07/2026), riga:
!   "< address-object IP_09_phishing_2026_Elisa 203.0.113.5"

! Modifica 1/2 - APPLICATA (confermata da screenshot_13.png: Policy Control
! riga 1 mostra Action=deny, Log=log alert. Nessun Apply separato richiesto,
! l'edit su dialogo scrive immediatamente sul dispositivo):
secure-policy 1
 name Blocco_Gruppo_IP_Phishing_Elisa
 from WAN
 to any (Excluding ZyWALL)
 sourceip Bad_IP_Phishing_Elisa_2026
 action deny
 log alert

! Modifica 2/2 - APPLICATA (confermata da screenshot_12.png: riapertura del
! gruppo mostra 10 membri residui, IP_01-IP_08 + IP_10 + IP_11_phishing_2026_Elisa,
! IP_09 assente in modo persistente):
no address-group-member Bad_IP_Phishing_Elisa_2026 IP_09_phishing_2026_Elisa

