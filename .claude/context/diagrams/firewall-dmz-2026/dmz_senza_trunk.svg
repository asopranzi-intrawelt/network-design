<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, Arial, sans-serif">

  <!-- Background -->
  <rect width="880" height="520" fill="#F4F6F8"/>

  <!-- Title bar -->
  <rect width="880" height="46" fill="#C0392B" rx="0"/>
  <text x="380" y="29" fill="white" font-size="15" font-weight="700" text-anchor="middle">SENZA TRUNK — Doppio cavo fisico</text>
  <rect x="660" y="8" width="200" height="30" fill="#A93226" rx="5"/>
  <text x="760" y="28" fill="#FADBD8" font-size="11" font-weight="700" text-anchor="middle">⚠  Non raccomandato</text>

  <!-- ── ZYXEL USG FLEX 500 ── -->
  <rect x="220" y="65" width="420" height="72" fill="#FADBD8" stroke="#C0392B" stroke-width="2" rx="7"/>
  <text x="430" y="90" fill="#922B21" font-size="14" font-weight="700" text-anchor="middle">Zyxel USG FLEX 500</text>
  <text x="430" y="108" fill="#7B241C" font-size="10" text-anchor="middle">Firewall / Router / VPN Gateway</text>

  <!-- Port tab: ge4 / lan1 -->
  <rect x="270" y="127" width="120" height="26" fill="#2471A3" stroke="#1A5276" stroke-width="1.5" rx="5"/>
  <text x="330" y="145" fill="white" font-size="10" font-weight="700" text-anchor="middle">ge4 / lan1  (P5)</text>

  <!-- Port tab: ge6 / dmz -->
  <rect x="470" y="127" width="120" height="26" fill="#D35400" stroke="#A04000" stroke-width="1.5" rx="5"/>
  <text x="530" y="145" fill="white" font-size="10" font-weight="700" text-anchor="middle">ge6 / dmz  (P7)</text>

  <!-- ── LAN PATH: ge4 → Switch ── (blue) -->
  <!-- ge4 bottom → corner → switch top -->
  <polyline points="330,153 330,195 175,195 175,235" fill="none" stroke="#2471A3" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="247" y="189" fill="#1A5276" font-size="9" font-weight="600" text-anchor="middle">LAN Ethernet</text>

  <!-- ── DMZ PATH: ge6 → Proxmox NIC2 (direct physical) ── (orange) -->
  <polyline points="530,153 530,195 672,195 672,255" fill="none" stroke="#D35400" stroke-width="2.5" stroke-dasharray="6,3" stroke-linejoin="round"/>

  <!-- Label bubble on direct DMZ cable -->
  <rect x="545" y="178" width="120" height="22" fill="#FDEBD0" stroke="#D35400" stroke-width="1.5" rx="4"/>
  <text x="605" y="193" fill="#A04000" font-size="9" font-weight="700" text-anchor="middle">cavo fisico diretto</text>

  <!-- ── SWITCH ZYXEL 54p ── -->
  <rect x="65" y="235" width="220" height="58" fill="#FDEBD0" stroke="#D35400" stroke-width="2" rx="7"/>
  <text x="175" y="261" fill="#873600" font-size="12" font-weight="700" text-anchor="middle">Switch Zyxel 54p GbE</text>
  <text x="175" y="278" fill="#7D6608" font-size="9" text-anchor="middle">access port — VLAN unica (LAN non tagged)</text>

  <!-- Switch right → Proxmox NIC1 -->
  <line x1="285" y1="264" x2="400" y2="264" stroke="#2471A3" stroke-width="2.5"/>
  <text x="342" y="257" fill="#1A5276" font-size="9" font-weight="600" text-anchor="middle">Ethernet LAN</text>

  <!-- ── PROXMOX HP GEN10 ── -->
  <rect x="380" y="237" width="400" height="220" fill="#EAFAF1" stroke="#1E8449" stroke-width="2.5" rx="8"/>
  <text x="580" y="263" fill="#1A5632" font-size="13" font-weight="700" text-anchor="middle">Proxmox — HP Gen10</text>

  <!-- NIC1 label -->
  <rect x="398" y="272" width="130" height="28" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5" rx="5"/>
  <text x="463" y="290" fill="#1E8449" font-size="10" font-weight="700" text-anchor="middle">NIC 1  —  LAN</text>

  <!-- NIC2 label (DMZ) -->
  <rect x="640" y="272" width="130" height="28" fill="#FDEBD0" stroke="#D35400" stroke-width="1.5" rx="5"/>
  <text x="705" y="290" fill="#A04000" font-size="10" font-weight="700" text-anchor="middle">NIC 2  —  DMZ</text>

  <!-- vmbr0 -->
  <rect x="398" y="322" width="130" height="26" fill="#A9DFBF" stroke="#27AE60" stroke-width="1" rx="4"/>
  <text x="463" y="339" fill="#1E8449" font-size="9" text-anchor="middle">vmbr0  (192.168.10+20.x)</text>
  <line x1="463" y1="300" x2="463" y2="322" stroke="#27AE60" stroke-width="1.5"/>

  <!-- vmbr1 (DMZ) -->
  <rect x="640" y="322" width="130" height="26" fill="#FAD7A0" stroke="#D35400" stroke-width="1" rx="4"/>
  <text x="705" y="339" fill="#A04000" font-size="9" text-anchor="middle">vmbr1  (192.168.201.x)</text>
  <line x1="705" y1="300" x2="705" y2="322" stroke="#D35400" stroke-width="1.5"/>

  <!-- VM DMZ box -->
  <rect x="635" y="373" width="140" height="50" fill="#F5CBA7" stroke="#A04000" stroke-width="2" rx="6"/>
  <text x="705" y="394" fill="#6E2C00" font-size="11" font-weight="700" text-anchor="middle">VM  —  DMZ</text>
  <text x="705" y="411" fill="#6E2C00" font-size="9" text-anchor="middle">192.168.201.x/24</text>
  <line x1="705" y1="348" x2="705" y2="373" stroke="#D35400" stroke-width="1.5"/>

  <!-- ── ANNOTATION BOX ── -->
  <rect x="30" y="390" width="335" height="112" fill="#FDEDEC" stroke="#C0392B" stroke-width="1.5" rx="7"/>
  <text x="197" y="412" fill="#922B21" font-size="11" font-weight="700" text-anchor="middle">⚠  Criticità dell'approccio fisico</text>
  <text x="48" y="430" fill="#6E2C00" font-size="10">• Occupa una porta fisica su Zyxel (P7) in modo dedicato</text>
  <text x="48" y="448" fill="#6E2C00" font-size="10">• Richiede un cavo aggiuntivo da P7 a NIC2 del server</text>
  <text x="48" y="466" fill="#6E2C00" font-size="10">• Non scalabile: ogni zona aggiuntiva = nuova NIC + cavo</text>
  <text x="48" y="484" fill="#6E2C00" font-size="10">• La DMZ non transita sullo switch esistente</text>
  <text x="48" y="497" fill="#C0392B" font-size="10" font-weight="600">• Rigidità operativa, scarsa manutenibilità</text>

  <!-- ── LEGEND ── -->
  <rect x="370" y="455" width="235" height="50" fill="#FDFEFE" stroke="#BDC3C7" stroke-width="1" rx="5"/>
  <line x1="382" y1="470" x2="412" y2="470" stroke="#2471A3" stroke-width="2.5"/>
  <text x="418" y="474" fill="#1A5276" font-size="9">Traffico LAN</text>
  <line x1="382" y1="492" x2="412" y2="492" stroke="#D35400" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="418" y="496" fill="#A04000" font-size="9">Traffico DMZ (cavo fisico diretto)</text>

</svg>
